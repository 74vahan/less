services:
  db:
    image: postgres:16-alpine
    container_name: calendar-db
    environment:
      POSTGRES_USER: ${DB_USER:-calendar}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-calendar}
      POSTGRES_DB: ${DB_NAME:-calendar}
    volumes:
      - calendar-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-calendar}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: calendar-backend
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-calendar}
      DB_PASSWORD: ${DB_PASSWORD:-calendar}
      DB_NAME: ${DB_NAME:-calendar}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      PORT: 8080
    volumes:
      - ./db:/app/db:ro
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: calendar-nginx
    ports:
      - "${HTTP_PORT:-8088}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  calendar-db-data:
